name: Deploy to Firebase Hosting on PR
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
      - name: checkout grid-editor
        uses: actions/checkout@v4
        with:
          repository: intechstudio/grid-editor
          ref: stable
          path: grid-editor
          sparse-checkout: |
            build-assets/lua-annotations
          sparse-checkout-cone-mode: false
      - uses: ./.github/actions/generate-api-docs
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_IS_KNOWLEDGE }}'
          projectId: is-knowledge
